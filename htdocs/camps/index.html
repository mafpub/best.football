<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Football Camps | best.football</title>
    <meta name="description" content="Search youth and high school football camps by location, date, and skill level.">
    <link rel="canonical" href="https://best.football/camps/">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'field': '#2d5a27',
                        'field-dark': '#1e3d1a',
                        'gold': '#d4af37',
                    }
                }
            }
        }
    </script>
    <style>
        .yard-line {
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 10%,
                rgba(255,255,255,0.1) 10%,
                rgba(255,255,255,0.1) 10.5%
            );
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
    <!--#include virtual="/includes/header.html" -->
    <main class="flex-1 container mx-auto px-4 py-8">

<header class="mb-8">
    <h1 class="text-3xl font-bold text-field-dark mb-2">Find Football Camps</h1>
    <p class="text-xl text-gray-600">Search camps by location, date, or skill level</p>
</header>

<div class="grid md:grid-cols-4 gap-8">
    <aside class="md:col-span-1">
        <form id="camp-filters" class="bg-white rounded-lg shadow p-6 space-y-4">
            <div>
                <label for="state" class="block text-sm font-medium text-gray-700 mb-1">State</label>
                <select id="state" name="state"
                        class="w-full border-gray-300 rounded px-3 py-2 border"
                        hx-get="/api/camps"
                        hx-trigger="change"
                        hx-target="#camp-results"
                        hx-include="#camp-filters">
                    <option value="">All States</option>
                    <option value="TX">Texas</option>
                    <option value="CA">California</option>
                    <option value="FL">Florida</option>
                    <option value="OH">Ohio</option>
                </select>
            </div>

            <div>
                <label for="city" class="block text-sm font-medium text-gray-700 mb-1">City</label>
                <input type="text" id="city" name="city"
                       class="w-full border-gray-300 rounded px-3 py-2 border"
                       placeholder="e.g., Austin"
                       hx-get="/api/camps"
                       hx-trigger="keyup changed delay:500ms"
                       hx-target="#camp-results"
                       hx-include="#camp-filters">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Camp Type</label>
                <div class="space-y-1">
                    <label class="flex items-center">
                        <input type="checkbox" name="type" value="university" class="mr-2">
                        University
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" name="type" value="private" class="mr-2">
                        Private
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" name="type" value="school" class="mr-2">
                        High School
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" name="type" value="organization" class="mr-2">
                        Organization
                    </label>
                </div>
            </div>

            <div>
                <label class="flex items-center">
                    <input type="checkbox" name="overnight" class="mr-2">
                    Overnight camps only
                </label>
            </div>
        </form>

        <div class="mt-6 bg-gold bg-opacity-20 rounded-lg p-6">
            <h3 class="font-semibold text-field-dark mb-2">List Your Camp</h3>
            <p class="text-sm text-gray-600 mb-4">Running a football camp? Add it to our directory for free.</p>
            <a href="/camps/submit.html" class="inline-block bg-gold text-white px-4 py-2 rounded text-sm hover:opacity-90">
                Submit Camp
            </a>
        </div>
    </aside>

    <section class="md:col-span-3">
        <div id="camp-results" class="space-y-4">
            <div class="bg-white rounded-lg shadow p-6 text-center text-gray-500">
                <p>No camps found matching your criteria.</p>
                <p class="mt-2">Try adjusting your filters or <a href="/camps/submit.html" class="text-field hover:underline">submit a camp</a>.</p>
            </div>
        </div>
    </section>
</div>

    </main>
    <!--#include virtual="/includes/footer.html" -->
</body>
</html>
