# best.football local development nginx config
# Include from /etc/nginx/sites-enabled/

server {
    listen 8625;
    server_name localhost;

    root /home/dd/code/sites/best.football/htdocs;
    index index.html;

    # Enable SSI
    ssi on;
    ssi_silent_errors off;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.html$ {
        ssi on;
        ssi_last_modified on;
    }

    # Proxy API requests to FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8626;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static assets with caching
    location ~* \.(css|js|jpg|png|webp|woff2|ico|svg)$ {
        expires 1d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Pagefind search assets
    location /search/ {
        add_header Cache-Control "no-cache";
    }
}
